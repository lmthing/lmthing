services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lmthing
      POSTGRES_PASSWORD: lmthing_local
      POSTGRES_DB: lmthing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../cloud/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmthing"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
