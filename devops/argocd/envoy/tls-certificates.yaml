# Let's Encrypt ClusterIssuer for ACME HTTP-01 challenges
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: ACME_EMAIL_PLACEHOLDER
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: lmthing-gw
                namespace: gateway

---
# TLS certificate for lmthing.cloud
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lmthing-cloud-tls
  namespace: gateway
spec:
  secretName: lmthing-cloud-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - DOMAIN_PLACEHOLDER

---
# TLS certificate for lmthing.computer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lmthing-computer-tls
  namespace: gateway
spec:
  secretName: lmthing-computer-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - COMPUTER_DOMAIN_PLACEHOLDER
