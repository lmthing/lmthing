packages:
  - blog
  - casa
  - com
  - space
  - social
  - store
  - team
  - cloud
  - org
  - sdk/org/libs/*
  - sdk/org/apps/*
  - automation/app

catalog:
  '@modelcontextprotocol/sdk': 1.29.0
  '@types/node': ^24
  dotenv: ^16.6.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
