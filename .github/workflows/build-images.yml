name: Build and Push Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated images to build (leave blank for all)'
        required: false
        default: ''
      allow_empty_history:
        description: 'Publish even if the site has no history.json yet (first publish only — otherwise it DESTROYS the rolling history)'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'cloud/gateway/**'
      - 'sdk/org'
      - 'sdk/org/**'
      - 'devops/argocd/compute/Dockerfile'
      - 'com/**'
      - 'social/**'
      - 'store/**'
      - 'org/**'
      - 'space/**'
      - 'team/**'
      - 'blog/**'
      - 'casa/**'
      - 'automation/app/**'
      # The status page's own source. Builds no image; publish-pages is the only
      # deployer of the site, so its source edits must come through here.
      - 'gh-pages/**'
      # Monorepo-root workspace files: every root-context image runs
      # `pnpm install --frozen-lockfile` against these, so a change to any of
      # them (e.g. a lockfile sync) must trigger a rebuild of the web surfaces.
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      # The root Docker build context is filtered by root .dockerignore, so a
      # change to it alters what every root-context image sees (e.g. which store
      # catalog files ship). Must trigger a rebuild.
      - '.dockerignore'

# Serialize whole runs on the same branch: update-manifests commits image tags
# to main, so overlapping runs would race on the ref. Queue rather than cancel —
# every build's tag update must land.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      sha: ${{ steps.tag.outputs.sha }}
      # Every image name, not just the changed ones: publish-pages carries the
      # per-image build records of images that did NOT rebuild this run.
      all_images: ${{ steps.build-matrix.outputs.all_images }}
      pages_changed: ${{ steps.changes.outputs.pages }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
          submodules: recursive

      - name: Detect changed image sources
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Monorepo-root workspace files. Every root-context image build runs
            # `pnpm install --frozen-lockfile` against the ROOT lockfile, so a
            # change to any of these must rebuild all of them. (compute builds
            # from the sdk/org context with sdk/org's OWN lockfile — already
            # covered by 'sdk/org/**' — so it deliberately omits this anchor.)
            _root: &root
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              # Root .dockerignore filters every root-context build's context.
              - '.dockerignore'
            gateway:
              - *root
              - 'cloud/gateway/**'
            computer:
              - *root
              - 'sdk/org'
              - 'sdk/org/**'
            compute:
              - 'sdk/org'
              - 'sdk/org/**'
              - 'devops/argocd/compute/Dockerfile'
            studio:
              - *root
              - 'sdk/org'
              - 'sdk/org/**'
            chat:
              - *root
              - 'sdk/org'
              - 'sdk/org/**'
            com:
              - *root
              - 'com/**'
              - 'sdk/org'
              - 'sdk/org/**'
            social:
              - *root
              - 'social/**'
              - 'sdk/org'
              - 'sdk/org/**'
            store:
              - *root
              - 'store/**'
              - 'sdk/org'
              - 'sdk/org/**'
            org:
              - *root
              - 'org/**'
              - 'sdk/org'
              - 'sdk/org/**'
            space:
              - *root
              - 'space/**'
              - 'sdk/org'
              - 'sdk/org/**'
            team:
              - *root
              - 'team/**'
              - 'sdk/org'
              - 'sdk/org/**'
            blog:
              - *root
              - 'blog/**'
              - 'sdk/org'
              - 'sdk/org/**'
            casa:
              - *root
              - 'casa/**'
              - 'sdk/org'
              - 'sdk/org/**'
            scenariodash:
              - *root
              - 'automation/app/**'
              - 'sdk/org'
              - 'sdk/org/**'
            # The status page's own source. No image builds from it, but an
            # edit to it still has to reach publish-pages — that job is the
            # only thing that deploys the site.
            pages:
              - 'gh-pages/**'

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build matrix
        id: build-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_IMAGES: ${{ github.event.inputs.images }}
          GATEWAY: ${{ steps.changes.outputs.gateway }}
          COMPUTER: ${{ steps.changes.outputs.computer }}
          COMPUTE: ${{ steps.changes.outputs.compute }}
          STUDIO: ${{ steps.changes.outputs.studio }}
          CHAT: ${{ steps.changes.outputs.chat }}
          COM: ${{ steps.changes.outputs.com }}
          SOCIAL: ${{ steps.changes.outputs.social }}
          STORE: ${{ steps.changes.outputs.store }}
          ORG: ${{ steps.changes.outputs.org }}
          SPACE: ${{ steps.changes.outputs.space }}
          TEAM: ${{ steps.changes.outputs.team }}
          BLOG: ${{ steps.changes.outputs.blog }}
          CASA: ${{ steps.changes.outputs.casa }}
          SCENARIODASH: ${{ steps.changes.outputs.scenariodash }}
        run: |
          python3 << 'EOF' >> $GITHUB_OUTPUT
          import json, os

          is_dispatch = os.environ["EVENT_NAME"] == "workflow_dispatch"
          dispatch_filter = {s.strip() for s in os.environ.get("DISPATCH_IMAGES", "").split(",") if s.strip()}

          def changed(name):
            if is_dispatch:
              return not dispatch_filter or name in dispatch_filter
            return os.environ[name.upper()] == "true"

          all_images = [
            {"image": "gateway",  "dockerfile": "cloud/gateway/Dockerfile",        "context": "cloud/gateway", "manifest": "devops/argocd/core/gateway.yaml",              "changed": changed("gateway")},
            {"image": "computer", "dockerfile": "sdk/org/apps/web/Dockerfile",     "context": ".",             "manifest": "devops/argocd/core/computer.yaml",             "changed": changed("computer")},
            {"image": "compute",  "dockerfile": "devops/argocd/compute/Dockerfile","context": "sdk/org",       "manifest": "devops/argocd/core/compute-pod-template.yaml", "changed": changed("compute")},
            {"image": "studio",   "dockerfile": "sdk/org/apps/web/Dockerfile",     "context": ".",             "manifest": "devops/argocd/core/studio.yaml",               "changed": changed("studio")},
            {"image": "chat",     "dockerfile": "sdk/org/apps/web/Dockerfile",     "context": ".",             "manifest": "devops/argocd/core/chat.yaml",                 "changed": changed("chat")},
            {"image": "com",      "dockerfile": "com/Dockerfile",                  "context": ".",             "manifest": "devops/argocd/core/com.yaml",                  "changed": changed("com")},
            {"image": "social",   "dockerfile": "social/Dockerfile",               "context": ".",             "manifest": "devops/argocd/core/social.yaml",               "changed": changed("social")},
            {"image": "store",    "dockerfile": "store/Dockerfile",                "context": ".",             "manifest": "devops/argocd/core/store.yaml",                "changed": changed("store")},
            {"image": "org",      "dockerfile": "org/Dockerfile",                  "context": ".",             "manifest": "devops/argocd/core/org.yaml",                  "changed": changed("org")},
            {"image": "space",    "dockerfile": "space/Dockerfile",                "context": ".",             "manifest": "devops/argocd/core/space.yaml",                "changed": changed("space")},
            {"image": "team",     "dockerfile": "team/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/team.yaml",                 "changed": changed("team")},
            {"image": "blog",     "dockerfile": "blog/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/blog.yaml",                 "changed": changed("blog")},
            {"image": "casa",     "dockerfile": "casa/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/casa.yaml",                 "changed": changed("casa")},
            {"image": "scenario-dash", "dockerfile": "automation/app/Dockerfile",  "context": ".",             "manifest": "devops/argocd/core/scenario-dash.yaml",        "changed": changed("scenariodash")},
          ]

          matrix = [
            {"image": e["image"], "dockerfile": e["dockerfile"], "context": e["context"], "manifest": e["manifest"]}
            for e in all_images if e["changed"]
          ]
          print("matrix=" + json.dumps(matrix))
          print("all_images=" + json.dumps([e["image"] for e in all_images]))
          EOF

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name lmthingacr

      - name: Build and push ${{ matrix.image }}
        id: build-step
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            lmthingacr.azurecr.io/${{ matrix.image }}:${{ needs.detect.outputs.sha }}
            lmthingacr.azurecr.io/${{ matrix.image }}:latest
          cache-from: type=registry,ref=lmthingacr.azurecr.io/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=lmthingacr.azurecr.io/${{ matrix.image }}:buildcache,mode=max

      - name: Record build metadata
        if: always()
        id: record
        run: |
          echo "started_at=${{ steps.build-step.outputs.metadata && 'unknown' || github.event.created_at }}" >> $GITHUB_OUTPUT
          echo "conclusion=${{ job.status }}" >> $GITHUB_OUTPUT
          python3 -c "
          import json, os, sys
          from datetime import datetime, timezone

          sha = '${{ needs.detect.outputs.sha }}'
          image = '${{ matrix.image }}'
          # Bare 'sha256:...' digest of the pushed image (docker/build-push-action
          # output). Phase 4: propagated to COMPUTE_IMAGE_DIGEST alongside the
          # sha tag so the gateway + compute-prepull DaemonSet can pin by digest.
          digest = '${{ steps.build-step.outputs.digest }}'
          run_id = '${{ github.run_id }}'
          run_number = '${{ github.run_number }}'

          record = {
            'image': image,
            'sha': sha,
            'digest': digest,
            'run_id': run_id,
            'run_number': int(run_number),
            'run_url': f'https://github.com/\${{ github.repository }}/actions/runs/{run_id}',
            'status': 'completed',
            'conclusion': os.environ.get('JOB_STATUS', 'unknown'),
            'updated_at': datetime.now(timezone.utc).isoformat(),
          }

          os.makedirs('build-data', exist_ok=True)
          with open(f'build-data/{image}.json', 'w') as f:
            json.dump(record, f, indent=2)
          print(f'Wrote build-data/{image}.json')
          "
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-data-${{ matrix.image }}
          path: build-data/${{ matrix.image }}.json
          retention-days: 7

  # The status page is deployed as a Pages ARTIFACT, never committed. The old
  # design committed generated build data to main and relied on that push to
  # fire deploy-ghpages.yml — which it could not do ([skip ci] + GITHUB_TOKEN
  # pushes do not start workflow runs). This job is now the single deployer of
  # the site, so it also runs for a gh-pages/** source edit that builds no
  # images at all.
  publish-pages:
    needs: [detect, build]
    if: >-
      always() &&
      (needs.detect.outputs.matrix != '[]' || needs.detect.outputs.pages_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        if: needs.detect.outputs.matrix != '[]'
        with:
          pattern: build-data-*
          path: downloaded-artifacts
          merge-multiple: true

      - name: Assemble build data
        env:
          SHA: ${{ needs.detect.outputs.sha }}
          ALL_IMAGES: ${{ needs.detect.outputs.all_images }}
          SITE_URL: https://lmthing.github.io/lmthing
          ALLOW_EMPTY_HISTORY: ${{ github.event.inputs.allow_empty_history }}
        run: |
          python3 << 'EOF'
          import json, os, glob, urllib.request, urllib.error, sys

          # Nothing is committed any more, so the ONLY copy of the rolling
          # history is the one on the live site. Read it back and build on top.
          site = os.environ['SITE_URL'].rstrip('/')

          def fetch(path):
            """Returns parsed JSON, or None on 404. Any OTHER failure raises:
            publishing after a failed read would truncate history to this run's
            records, and the next run would build on the truncated copy —
            permanent loss."""
            url = f'{site}/{path}'
            try:
              with urllib.request.urlopen(url, timeout=30) as r:
                return json.loads(r.read().decode())
            except urllib.error.HTTPError as e:
              if e.code == 404:
                return None
              raise
            except json.JSONDecodeError:
              # A corrupt published file must not silently wipe history either.
              raise RuntimeError(f'{url} is not valid JSON')

          os.makedirs('gh-pages/data/builds', exist_ok=True)

          # This run's records (absent entirely on a pages-only change)
          records = []
          for path in glob.glob('downloaded-artifacts/*.json'):
            with open(path) as f:
              records.append(json.load(f))
          print(f'This run produced {len(records)} build records')

          # Per-image latest: carry over every image that did NOT rebuild, so a
          # rarely-built image keeps its card instead of vanishing from the site.
          built = {r['image'] for r in records}
          for image in json.loads(os.environ['ALL_IMAGES']):
            if image in built:
              continue
            # A 404 here is ordinary: an image that has never been built has no
            # record to carry. (Unlike history.json below, where it is not.)
            prev = fetch(f'data/builds/{image}.json')
            if prev is None:
              print(f'  {image}: no published record yet, skipping')
            else:
              with open(f'gh-pages/data/builds/{image}.json', 'w') as f:
                json.dump(prev, f, indent=2)

          for rec in records:
            with open(f'gh-pages/data/builds/{rec["image"]}.json', 'w') as f:
              json.dump(rec, f, indent=2)

          # Rolling history (deduped by SHA, capped at 50).
          # A 404 here is NOT treated as "first publish": Pages answers 404 for a
          # misconfigured or broken site too, so inferring "start fresh" from it
          # would republish a 1-entry history and destroy the real one for good.
          # Bootstrapping is opt-in via the workflow_dispatch input instead.
          history = fetch('data/builds/history.json')
          if history is None:
            if os.environ.get('ALLOW_EMPTY_HISTORY') == 'true':
              print('history.json 404 — starting fresh (explicitly requested)')
              history = []
            else:
              # No escapes here on purpose: this is a python heredoc nested in
              # YAML, and backslash escapes do not survive the trip.
              print('FATAL: ' + site + '/data/builds/history.json returned 404.')
              print('Refusing to publish: it would replace the rolling history')
              print("with only this run's records, and the next run would then")
              print('build on the truncated copy. If this really is the first')
              print('publish, re-run via workflow_dispatch with')
              print('allow_empty_history=true.')
              sys.exit(1)
          before = len(history)
          sha = os.environ.get('SHA', '')
          history = [h for h in history if h.get('sha') != sha]
          for rec in records:
            history.insert(0, rec)
          history = history[:50]

          with open('gh-pages/data/builds/history.json', 'w') as f:
            json.dump(history, f, indent=2)

          print(f'History: carried {before} -> published {len(history)}')
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-manifests:
    # Now the ONLY job that pushes to main — publish-pages deploys an artifact
    # instead of committing — so it no longer needs to serialize behind it and
    # can run in parallel.
    needs: [detect, build]
    # Run when at least one image was built (even if some failed, e.g. compute).
    # The script below reads build-data artifacts to skip images that failed.
    if: always() && needs.detect.outputs.matrix != '[]' && needs.build.result != 'cancelled' && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Download build artifacts to check which images succeeded
        uses: actions/download-artifact@v4
        with:
          pattern: build-data-*
          path: downloaded-artifacts
          merge-multiple: true

      - name: Update image tags in manifests
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
          SHA: ${{ needs.detect.outputs.sha }}
        run: |
          python3 << 'EOF'
          import json, os, re, glob

          matrix = json.loads(os.environ["MATRIX"])
          sha = os.environ["SHA"]

          # Only update manifests for images whose build artifact exists and succeeded
          built = set()
          digests = {}
          for path in glob.glob('downloaded-artifacts/*.json'):
            with open(path) as f:
              rec = json.load(f)
            if rec.get('conclusion') == 'success':
              built.add(rec['image'])
              if rec.get('digest'):
                digests[rec['image']] = rec['digest']

          for entry in matrix:
            if entry['image'] not in built:
              print(f"Skipping {entry['image']} — build did not succeed")
              continue
            manifest = entry["manifest"]
            image = entry["image"]
            pattern = rf'(image: lmthingacr\.azurecr\.io/{re.escape(image)}:)\S+'
            with open(manifest) as f:
              content = f.read()
            new_content = re.sub(pattern, rf'\g<1>{sha}', content)
            with open(manifest, "w") as f:
              f.write(new_content)
            # When the compute image is rebuilt, also update COMPUTE_IMAGE_TAG
            # (and, when a digest was captured, COMPUTE_IMAGE_DIGEST) in
            # gateway.yaml so the gateway can advertise the latest build.
            if image == "compute":
              digest = digests.get(image)
              gw = "devops/argocd/core/gateway.yaml"
              with open(gw) as f:
                gw_content = f.read()
              gw_new = re.sub(
                r'(- name: COMPUTE_IMAGE_TAG\s*\n\s+value:\s*)"[^"]*"',
                rf'\g<1>"{sha}"',
                gw_content,
              )
              if digest:
                gw_new = re.sub(
                  r'(- name: COMPUTE_IMAGE_DIGEST\s*\n\s+value:\s*)"[^"]*"',
                  rf'\g<1>"{digest}"',
                  gw_new,
                )
              with open(gw, "w") as f:
                f.write(gw_new)

              # Pre-pull DaemonSet (Phase 4 fast cold-start): pin by digest so
              # containerd caches the exact layers a real user pod will
              # request. Bumped in lockstep with COMPUTE_IMAGE_DIGEST above.
              if digest:
                prepull = "devops/argocd/core/compute-prepull.yaml"
                if os.path.exists(prepull):
                  with open(prepull) as f:
                    prepull_content = f.read()
                  prepull_new = re.sub(
                    r'(image: lmthingacr\.azurecr\.io/compute@)sha256:\S+',
                    rf'\g<1>{digest}',
                    prepull_content,
                  )
                  with open(prepull, "w") as f:
                    f.write(prepull_new)
          EOF

      - name: Commit and push
        env:
          SHA: ${{ needs.detect.outputs.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devops/argocd/core/
          git diff --staged --quiet || git commit -m "ci: update image tags to $SHA [skip ci]"
          git pull --rebase origin main
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER_URL: ${{ secrets.ARGOCD_SERVER_URL }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          [ -z "$ARGOCD_SERVER_URL" ] && exit 0
          curl -sf -X POST "$ARGOCD_SERVER_URL/api/v1/applications/lmthing/sync" \
            -H "Authorization: Bearer $ARGOCD_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"prune": false, "dryRun": false}' || true
