# lmthing.app — routed EXACTLY like lmthing.studio/lmthing.chat: a JWT-FREE static
# unified-SPA shell at /* (which renders the login page when unauthenticated and then
# self-authenticates via @lmthing/auth), plus a JWT-authenticated /api/* proxy to the
# user's compute pod (per-user Lua routing). This is why the other domains show a login
# page instead of a raw 401 — the shell is public; only /api/* requires the token.

# HTTP -> HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-http-redirect
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-http
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# POST /api/apps/install -> same dynamic per-user backend, but with a LONG request
# timeout. Installing an app downloads its files, boots the project db, and ALWAYS
# (re)builds contracts + pages (esbuild bundles @lmthing/ui/chat for Chat-using apps) —
# a heavy app (kitchen/health/blog, 8 pages) takes well over Envoy's 15s default, so
# without this the browser gets HTTP 504 on every attempt even though the pod finishes
# (idempotent). A more specific path prefix than `/api`, so it wins precedence for
# this path. Keep the general /api route at the default timeout (streaming/WS unaffected).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-install-proxy
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-https
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/apps/install
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      timeouts:
        request: "300s"
        backendRequest: "300s"
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1

---
# /api/* -> Dynamic per-user backend (JWT-authenticated, Lua-routed). The served UI's
# fetches carry `Authorization: Bearer`; its WS carries `?access_token=`. No path rewrite
# (like chat-api-proxy): the pod's routes under /api/* are kept verbatim.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-api-proxy
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-https
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1

---
# /app/* -> the user's pod, which serves the installed apps' built pages at
# /app/<project>/… (+ their /app/<project>/api/*). Single-user apps have no auth of their
# own; the platform routes to the right pod via the per-user JWT (from the access_token
# COOKIE for page + asset navigations, or header/param for fetches) — see app-policies.yaml.
# Matched before /* so app pages hit the pod, not the SPA.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-pages-proxy
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-https
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /app
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1

---
# SHELL (JWT-free) -> the static unified web app. Unlike studio/chat (where the SPA is
# the `/` catch-all), on lmthing.app the pod owns the catch-all so installed apps get
# CLEAN root URLs (lmthing.app/<project>/…). The shell therefore only serves its own
# fixed paths, which take precedence over the catch-all below (Exact > longer prefix):
#   • Exact `/`     — the launcher document (the client shows this surface at `/`)
#   • /assets/*     — the SPA's hashed JS/CSS
#   • /favicon.ico/ — the shared favicon bundle (index.html references /favicon.ico/*)
#   • /install      — the store's "install to my pod" landing (self-authenticates, POSTs
#                     the install to the pod). Kept JWT-free so a logged-out arrival sees
#                     the login page, not a 401.
# Every one of these is more specific than the `/` catch-all below, so it wins. Reuses the
# shared unified-SPA Service (same image as studio/chat/computer).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-shell
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-https
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: Exact
            value: /
        - path:
            type: PathPrefix
            value: /assets
        - path:
            type: PathPrefix
            value: /favicon.ico
        - path:
            type: PathPrefix
            value: /install
      backendRefs:
        - group: ""
          kind: Service
          name: studio
          namespace: lmthing
          port: 80
          weight: 1

---
# /* (catch-all) -> the user's pod. Everything the shell above does NOT reserve is an
# installed app served at the ROOT mount (lmthing.app/<project>/… + /<project>/api/*) —
# the pod registers a bare `/<project>/*` route in this (behind-Envoy) mode. Same per-user
# JWT/Lua routing as /app/* (from the access_token cookie for page+asset navigations, or
# header/param for fetches — see app-policies.yaml). Lowest precedence, so /api, /app,
# /assets, /install and Exact / all win first.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-pages-bare
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: app-https
  hostnames:
    - lmthing.app
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1
