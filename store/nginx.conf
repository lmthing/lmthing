server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback. Deliberately NO `$uri/`: the catalog build copies app
    # templates into `dist/apps/`, so `$uri/` would make client routes that
    # collide with a real directory (e.g. `/apps`) 301 → 403 (directory, no
    # index) instead of serving the SPA. Real files (assets, manifest.json,
    # copied templates) still match `$uri`; everything else → index.html.
    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the SPA shell, or returning users keep an old index.html that
    # references stale (since-replaced) /assets/ hashes after a deploy and see
    # the previous build until a hard refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
