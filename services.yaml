services:
  - name: studio
    type: vite
    domain: lmthing.studio
    local: studio.test
    port: 3000
    emoji: 🎨
    color: "35" # magenta

  - name: chat
    type: vite
    domain: lmthing.chat
    local: chat.test
    port: 3001
    emoji: 💬
    color: "36" # cyan
    headers:
      Cross-Origin-Embedder-Policy: credentialless
      Cross-Origin-Opener-Policy: same-origin

  - name: com
    type: vite
    domain: lmthing.com
    local: com.test
    port: 3002
    emoji: 🌐
    color: "34" # blue

  - name: social
    type: vite
    domain: lmthing.social
    local: social.test
    port: 3003
    emoji: 👥
    color: "33" # yellow

  - name: store
    type: vite
    domain: lmthing.store
    local: store.test
    port: 3004
    emoji: 🏪
    color: "32" # green

  - name: space
    type: vite
    domain: lmthing.space
    local: space.test
    port: 3005
    emoji: 🚀
    color: "34" # blue

  - name: team
    type: vite
    domain: lmthing.team
    local: team.test
    port: 3006
    emoji: 👔
    color: "36" # cyan

  - name: blog
    type: vite
    domain: lmthing.blog
    local: blog.test
    port: 3007
    emoji: 📝
    color: "33" # yellow

  - name: casa
    type: vite
    domain: lmthing.casa
    local: casa.test
    port: 3008
    emoji: 🏠
    color: "32" # green

  - name: cloud
    type: gateway
    domain: lmthing.cloud
    local: cloud.test
    port: 3009
    emoji: ☁️
    color: "37" # white

  - name: computer
    type: vite
    domain: lmthing.computer
    local: computer.test
    port: 3010
    emoji: 🖥️
    color: "35" # magenta
    headers:
      Cross-Origin-Embedder-Policy: credentialless
      Cross-Origin-Opener-Policy: same-origin
      Cross-Origin-Resource-Policy: cross-origin
