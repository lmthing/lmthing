name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'cloud/gateway/**'
      - 'computer/**'
      - 'sdk/libs/**'
      - 'sdk/org/**'
      - 'devops/argocd/compute/Dockerfile'
      - 'studio/**'
      - 'chat/**'
      - 'com/**'
      - 'social/**'
      - 'store/**'
      - 'space/**'
      - 'team/**'
      - 'blog/**'
      - 'casa/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
          submodules: recursive

      - name: Detect changed image sources
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'cloud/gateway/**'
            computer:
              - 'computer/**'
              - 'sdk/libs/auth/**'
              - 'sdk/org/cli/**'
              - 'sdk/libs/css/**'
              - 'sdk/libs/state/**'
              - 'sdk/libs/thing/**'
              - 'sdk/libs/ui/**'
              - 'sdk/libs/utils/**'
            compute:
              - 'sdk/org/repl/**'
              - 'devops/argocd/compute/Dockerfile'
            studio:
              - 'studio/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            chat:
              - 'chat/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            com:
              - 'com/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            social:
              - 'social/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            store:
              - 'store/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            space:
              - 'space/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            team:
              - 'team/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            blog:
              - 'blog/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            casa:
              - 'casa/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name lmthingacr

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push gateway
        if: steps.changes.outputs.gateway == 'true'
        run: |
          docker build \
            -t lmthingacr.azurecr.io/gateway:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/gateway:latest \
            cloud/gateway/
          docker push lmthingacr.azurecr.io/gateway:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/gateway:latest
          sed -i "s|image: lmthingacr.azurecr.io/gateway:.*|image: lmthingacr.azurecr.io/gateway:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/gateway.yaml

      - name: Build and push computer
        if: steps.changes.outputs.computer == 'true'
        run: |
          docker build \
            -f computer/Dockerfile \
            -t lmthingacr.azurecr.io/computer:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/computer:latest \
            .
          docker push lmthingacr.azurecr.io/computer:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/computer:latest
          sed -i "s|image: lmthingacr.azurecr.io/computer:.*|image: lmthingacr.azurecr.io/computer:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/computer.yaml

      - name: Build and push compute
        if: steps.changes.outputs.compute == 'true'
        run: |
          docker build \
            -t lmthingacr.azurecr.io/compute:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/compute:latest \
            -f devops/argocd/compute/Dockerfile \
            .
          docker push lmthingacr.azurecr.io/compute:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/compute:latest
          sed -i "s|image: lmthingacr.azurecr.io/compute:.*|image: lmthingacr.azurecr.io/compute:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/compute-pod-template.yaml

      - name: Build and push studio
        if: steps.changes.outputs.studio == 'true'
        run: |
          docker build \
            -f studio/Dockerfile \
            -t lmthingacr.azurecr.io/studio:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/studio:latest \
            .
          docker push lmthingacr.azurecr.io/studio:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/studio:latest
          sed -i "s|image: lmthingacr.azurecr.io/studio:.*|image: lmthingacr.azurecr.io/studio:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/studio.yaml

      - name: Build and push chat
        if: steps.changes.outputs.chat == 'true'
        run: |
          docker build \
            -f chat/Dockerfile \
            -t lmthingacr.azurecr.io/chat:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/chat:latest \
            .
          docker push lmthingacr.azurecr.io/chat:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/chat:latest
          sed -i "s|image: lmthingacr.azurecr.io/chat:.*|image: lmthingacr.azurecr.io/chat:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/chat.yaml

      - name: Build and push com
        if: steps.changes.outputs.com == 'true'
        run: |
          docker build \
            -f com/Dockerfile \
            -t lmthingacr.azurecr.io/com:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/com:latest \
            .
          docker push lmthingacr.azurecr.io/com:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/com:latest
          sed -i "s|image: lmthingacr.azurecr.io/com:.*|image: lmthingacr.azurecr.io/com:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/com.yaml

      - name: Build and push social
        if: steps.changes.outputs.social == 'true'
        run: |
          docker build \
            -f social/Dockerfile \
            -t lmthingacr.azurecr.io/social:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/social:latest \
            .
          docker push lmthingacr.azurecr.io/social:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/social:latest
          sed -i "s|image: lmthingacr.azurecr.io/social:.*|image: lmthingacr.azurecr.io/social:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/social.yaml

      - name: Build and push store
        if: steps.changes.outputs.store == 'true'
        run: |
          docker build \
            -f store/Dockerfile \
            -t lmthingacr.azurecr.io/store:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/store:latest \
            .
          docker push lmthingacr.azurecr.io/store:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/store:latest
          sed -i "s|image: lmthingacr.azurecr.io/store:.*|image: lmthingacr.azurecr.io/store:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/store.yaml

      - name: Build and push space
        if: steps.changes.outputs.space == 'true'
        run: |
          docker build \
            -f space/Dockerfile \
            -t lmthingacr.azurecr.io/space:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/space:latest \
            .
          docker push lmthingacr.azurecr.io/space:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/space:latest
          sed -i "s|image: lmthingacr.azurecr.io/space:.*|image: lmthingacr.azurecr.io/space:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/space.yaml

      - name: Build and push team
        if: steps.changes.outputs.team == 'true'
        run: |
          docker build \
            -f team/Dockerfile \
            -t lmthingacr.azurecr.io/team:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/team:latest \
            .
          docker push lmthingacr.azurecr.io/team:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/team:latest
          sed -i "s|image: lmthingacr.azurecr.io/team:.*|image: lmthingacr.azurecr.io/team:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/team.yaml

      - name: Build and push blog
        if: steps.changes.outputs.blog == 'true'
        run: |
          docker build \
            -f blog/Dockerfile \
            -t lmthingacr.azurecr.io/blog:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/blog:latest \
            .
          docker push lmthingacr.azurecr.io/blog:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/blog:latest
          sed -i "s|image: lmthingacr.azurecr.io/blog:.*|image: lmthingacr.azurecr.io/blog:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/blog.yaml

      - name: Build and push casa
        if: steps.changes.outputs.casa == 'true'
        run: |
          docker build \
            -f casa/Dockerfile \
            -t lmthingacr.azurecr.io/casa:${{ steps.tag.outputs.sha }} \
            -t lmthingacr.azurecr.io/casa:latest \
            .
          docker push lmthingacr.azurecr.io/casa:${{ steps.tag.outputs.sha }}
          docker push lmthingacr.azurecr.io/casa:latest
          sed -i "s|image: lmthingacr.azurecr.io/casa:.*|image: lmthingacr.azurecr.io/casa:${{ steps.tag.outputs.sha }}|" \
            devops/argocd/core/casa.yaml

      - name: Commit updated image tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devops/argocd/core/gateway.yaml \
                  devops/argocd/core/computer.yaml \
                  devops/argocd/core/compute-pod-template.yaml \
                  devops/argocd/core/studio.yaml \
                  devops/argocd/core/chat.yaml \
                  devops/argocd/core/com.yaml \
                  devops/argocd/core/social.yaml \
                  devops/argocd/core/store.yaml \
                  devops/argocd/core/space.yaml \
                  devops/argocd/core/team.yaml \
                  devops/argocd/core/blog.yaml \
                  devops/argocd/core/casa.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.sha }} [skip ci]"
          git push
