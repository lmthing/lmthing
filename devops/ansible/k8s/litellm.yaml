apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: lmthing
data:
  config.yaml: |
    model_list:
      # ── FREE TIER ──────────────────────────────────────────
      - model_name: gpt-5.4-nano
        litellm_params:
          model: azure/gpt-5.4-nano
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 10% markup — set these to (azure_cost * 1.1)
          input_cost_per_token: 0.000000165
          output_cost_per_token: 0.00000165

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL

    litellm_settings:
      drop_params: true
      set_verbose: false
      num_retries: 2
      request_timeout: 120

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: lmthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: DATABASE_URL
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: LITELLM_MASTER_KEY
            - name: AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AZURE_API_KEY
            - name: AZURE_API_BASE
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AZURE_API_BASE
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: lmthing
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
