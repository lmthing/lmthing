apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: lmthing

---
# Allows the gateway to create/delete user-* namespaces, deployments, and services
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lmthing-compute-manager
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lmthing-compute-manager
subjects:
  - kind: ServiceAccount
    name: gateway
    namespace: lmthing
roleRef:
  kind: ClusterRole
  name: lmthing-compute-manager
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: lmthing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: gateway
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: gateway
          image: lmthingacr.azurecr.io/gateway:77e9486
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_URL
              value: "http://litellm:4000"
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: BASE_URL
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PRICE_BASIC
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: STRIPE_PRICE_BASIC
            - name: STRIPE_PRICE_PRO
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: STRIPE_PRICE_PRO
            - name: STRIPE_PRICE_MAX
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: STRIPE_PRICE_MAX
            - name: ZITADEL_URL
              value: "https://auth.lmthing.cloud"
            - name: ZITADEL_GITHUB_IDP_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_GITHUB_IDP_ID
            - name: ZITADEL_ISSUER
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_ISSUER
            - name: ZITADEL_SERVICE_PAT
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_SERVICE_PAT
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_CLIENT_ID
            - name: ZITADEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_CLIENT_SECRET
            - name: GATEWAY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GATEWAY_JWT_SECRET
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_SLUG
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_APP_SLUG
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_APP_PRIVATE_KEY
            - name: GITHUB_ISSUES_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_ISSUES_TOKEN
            # Render-service token — the gateway injects this into each pod's user-env as
            # RENDER_SERVICE_TOKEN so the webSearch google provider can authenticate to the
            # in-cluster render service. Optional so a blank/absent key never crashes the pod.
            - name: RENDER_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: RENDER_SERVICE_TOKEN
                  optional: true
            # OAuth integrations (Connections) — optional so a blank/absent key
            # never crashes the pod; a provider without creds reports configured:false.
            - name: CONNECTIONS_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: CONNECTIONS_ENC_KEY
                  optional: true
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
                  optional: true
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
                  optional: true
            - name: SLACK_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: SLACK_OAUTH_CLIENT_ID
                  optional: true
            - name: SLACK_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: SLACK_OAUTH_CLIENT_SECRET
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_OAUTH_CLIENT_ID
                  optional: true
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: GITHUB_OAUTH_CLIENT_SECRET
                  optional: true
            - name: GITHUB_ISSUES_REPO
              value: "lmthing/bug-reports"
            - name: GITHUB_BUGREPORT_REPO
              value: "lmthing/bug-reports"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: DATABASE_URL
            - name: ACR_REGISTRY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ACR_REGISTRY
            - name: ACR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ACR_USERNAME
            - name: ACR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ACR_PASSWORD
            - name: COMPUTE_IMAGE_TAG
              value: "1d418aa"
            # Phase 4 fast cold-start: when set (bare "sha256:...", no
            # "compute@" prefix), the gateway builds
            # ${ACR_REGISTRY}/compute@${COMPUTE_IMAGE_DIGEST} with
            # imagePullPolicy: IfNotPresent instead of compute:latest +
            # Always (see cloud/gateway/src/lib/compute.ts). Empty today —
            # CI (.github/workflows/build-images.yml) fills this in on the
            # next successful compute image build, in lockstep with
            # COMPUTE_IMAGE_TAG and the compute-prepull DaemonSet image.
            - name: COMPUTE_IMAGE_DIGEST
              value: "sha256:02c875a881e23719c7365f7d77b78562f4e554ebd5d1c8ce49ed2f68efe1056d"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: lmthing
spec:
  selector:
    app: gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
