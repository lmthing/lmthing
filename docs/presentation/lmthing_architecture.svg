<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="at" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00C896"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#141414"/>

  <!-- ═══ USER BOX ═══ -->
  <rect x="460" y="18" width="280" height="64" rx="10" fill="#1A2E28" stroke="#00C896" stroke-width="2"/>
  <text x="600" y="46" text-anchor="middle" fill="#FFF" font-size="18" font-weight="bold">USER</text>
  <text x="600" y="68" text-anchor="middle" fill="#00C896" font-size="13">Domain Expert</text>

  <!-- ═══ ARROW: User → THING (solid teal) ═══ -->
  <path d="M 510,82 C 430,125 300,152 200,176" stroke="#00C896" stroke-width="2" fill="none" marker-end="url(#at)"/>
  <rect x="330" y="100" width="90" height="21" rx="4" fill="#141414"/>
  <text x="375" y="115" text-anchor="middle" fill="#00C896" font-size="12" font-style="italic">via THING</text>

  <!-- ═══ ARROW: User → Agent Direct (dashed gray) ═══ -->
  <path d="M 680,82 C 680,140 560,168 560,206" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#ag)"/>
  <rect x="696" y="110" width="54" height="21" rx="4" fill="#141414"/>
  <text x="723" y="125" text-anchor="middle" fill="#777" font-size="12" font-style="italic">direct</text>

  <!-- ═══ THING BOX ═══ -->
  <rect x="28" y="178" width="340" height="200" rx="14" fill="#0D1F1A" stroke="#00C896" stroke-width="2.5"/>
  <!-- Header bar -->
  <rect x="28" y="178" width="340" height="48" rx="14" fill="#00C896"/>
  <rect x="28" y="200" width="340" height="26" fill="#00C896"/>
  <text x="198" y="213" text-anchor="middle" fill="#0D1F1A" font-size="22" font-weight="bold" letter-spacing="3">THING</text>
  <text x="198" y="252" text-anchor="middle" fill="#EEE" font-size="15" font-weight="bold">System Agent</text>
  <text x="198" y="274" text-anchor="middle" fill="#999" font-size="12">Orchestrates across all Spaces</text>
  <!-- LLM badge -->
  <rect x="62" y="288" width="252" height="30" rx="8" fill="#142018" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <text x="188" y="308" text-anchor="middle" fill="#00C896" font-size="12">⚡ Own LLM config (any provider)</text>
  <!-- Cross-space badge -->
  <rect x="62" y="326" width="252" height="30" rx="8" fill="#1A2E26" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <text x="188" y="346" text-anchor="middle" fill="#00C896" font-size="12" font-weight="bold">↔ Full access to all Spaces</text>

  <!-- ═══ "Also controls" other spaces ═══ -->
  <text x="198" y="405" text-anchor="middle" fill="#666" font-size="11">Also controls:</text>
  <rect x="62" y="414" width="110" height="28" rx="6" fill="#131F1A" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <text x="117" y="432" text-anchor="middle" fill="#555" font-size="12">Space B</text>
  <rect x="186" y="414" width="110" height="28" rx="6" fill="#131F1A" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <text x="241" y="432" text-anchor="middle" fill="#555" font-size="12">Space C</text>
  <text x="198" y="462" text-anchor="middle" fill="#444" font-size="13" letter-spacing="6">· · ·</text>

  <!-- ═══ ARROW: THING → Space ═══ -->
  <path d="M 368,288 L 408,288" stroke="#00C896" stroke-width="2" marker-end="url(#at)"/>
  <text x="388" y="281" text-anchor="middle" fill="#00C896" font-size="11">controls</text>

  <!-- ═══ SPACE CONTAINER ═══ -->
  <rect x="408" y="162" width="764" height="516" rx="16" fill="#161616" stroke="#00C896" stroke-width="2"/>
  <!-- Space header -->
  <text x="432" y="193" fill="#00C896" font-size="15" font-weight="bold">SPACE</text>
  <line x1="484" y1="175" x2="484" y2="200" stroke="#00C896" stroke-width="1" stroke-opacity="0.3"/>
  <text x="496" y="193" fill="#555" font-size="13">Knowledge · Agents · Workflows · Settings</text>

  <!-- ─── AGENT BOX ─── -->
  <rect x="428" y="208" width="264" height="140" rx="10" fill="#1A2E26" stroke="#00C896" stroke-width="1.5"/>
  <text x="560" y="235" text-anchor="middle" fill="#00C896" font-size="15" font-weight="bold">Agent</text>
  <text x="560" y="257" text-anchor="middle" fill="#CCC" font-size="12">Specialized Prompt + Tools</text>
  <rect x="462" y="268" width="196" height="28" rx="6" fill="#0E1A16" stroke="#00C896" stroke-width="1" stroke-opacity="0.4"/>
  <text x="560" y="287" text-anchor="middle" fill="#00C896" font-size="12">⚡ Own LLM config</text>
  <text x="560" y="334" text-anchor="middle" fill="#555" font-size="11" font-style="italic">1…N agents per Space</text>

  <!-- ─── ARROW: Agent → Knowledge ─── -->
  <path d="M 692,262 L 718,262" stroke="#00C896" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#at)"/>
  <text x="705" y="255" text-anchor="middle" fill="#666" font-size="10">reads</text>

  <!-- ─── ARROW: Agent → Workflows ─── -->
  <path d="M 560,348 L 560,368" stroke="#00C896" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#at)"/>
  <text x="600" y="363" fill="#666" font-size="10">triggers</text>

  <!-- ─── WORKFLOWS BOX ─── -->
  <rect x="428" y="370" width="264" height="84" rx="10" fill="#1A1A1A" stroke="#00C896" stroke-width="1" stroke-opacity="0.6"/>
  <text x="560" y="400" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">Workflows</text>
  <text x="560" y="420" text-anchor="middle" fill="#999" font-size="12">Chained steps · Autonomous</text>
  <text x="560" y="440" text-anchor="middle" fill="#555" font-size="11">User or Agent triggered</text>

  <!-- ─── SETTINGS BOX ─── -->
  <rect x="428" y="468" width="264" height="68" rx="10" fill="#161616" stroke="#444" stroke-width="1"/>
  <text x="560" y="498" text-anchor="middle" fill="#666" font-size="13" font-weight="bold">Settings</text>
  <text x="560" y="520" text-anchor="middle" fill="#444" font-size="11">Config · Permissions · LLM defaults</text>

  <!-- ─── KNOWLEDGE AREA ─── -->
  <rect x="718" y="200" width="434" height="452" rx="10" fill="#121A18" stroke="#00C896" stroke-width="1" stroke-opacity="0.4"/>
  <text x="935" y="228" text-anchor="middle" fill="#00C896" font-size="14" font-weight="bold">Knowledge</text>

  <!-- Field 1 -->
  <rect x="738" y="242" width="186" height="34" rx="8" fill="#1F2F2A" stroke="#00C896" stroke-width="1"/>
  <text x="831" y="264" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Field</text>
  <line x1="831" y1="276" x2="831" y2="296" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="754" y="296" width="154" height="28" rx="6" fill="#172120" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <text x="831" y="315" text-anchor="middle" fill="#CCC" font-size="12">Topic</text>
  <line x1="831" y1="324" x2="831" y2="340" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="764" y="340" width="134" height="24" rx="5" fill="#111816" stroke="#444" stroke-width="1"/>
  <text x="831" y="357" text-anchor="middle" fill="#666" font-size="11">📄 .md files</text>
  <line x1="831" y1="364" x2="831" y2="380" stroke="#00C896" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="754" y="380" width="154" height="28" rx="6" fill="#172120" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <text x="831" y="399" text-anchor="middle" fill="#CCC" font-size="12">Topic</text>
  <line x1="831" y1="408" x2="831" y2="424" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="764" y="424" width="134" height="24" rx="5" fill="#111816" stroke="#444" stroke-width="1"/>
  <text x="831" y="441" text-anchor="middle" fill="#666" font-size="11">📄 .md files</text>

  <!-- Field 2 -->
  <rect x="946" y="242" width="186" height="34" rx="8" fill="#1F2F2A" stroke="#00C896" stroke-width="1"/>
  <text x="1039" y="264" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Field</text>
  <line x1="1039" y1="276" x2="1039" y2="296" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="962" y="296" width="154" height="28" rx="6" fill="#172120" stroke="#00C896" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1039" y="315" text-anchor="middle" fill="#CCC" font-size="12">Topic</text>
  <line x1="1039" y1="324" x2="1039" y2="340" stroke="#00C896" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="972" y="340" width="134" height="24" rx="5" fill="#111816" stroke="#444" stroke-width="1"/>
  <text x="1039" y="357" text-anchor="middle" fill="#666" font-size="11">📄 .md files</text>
  <text x="1039" y="404" text-anchor="middle" fill="#444" font-size="22" letter-spacing="6">· · ·</text>

  <!-- More fields note -->
  <text x="935" y="460" text-anchor="middle" fill="#444" font-size="12" font-style="italic">· · · more fields</text>

  <!-- Verified strip -->
  <rect x="738" y="474" width="394" height="58" rx="8" fill="#0D1A14"/>
  <text x="935" y="498" text-anchor="middle" fill="#00C896" font-size="12" font-weight="bold">✓ Transparent · Editable · Auditable</text>
  <text x="935" y="518" text-anchor="middle" fill="#666" font-size="11">Plain markdown — grounding source for all agents, readable by humans</text>

  <!-- ═══ BOTTOM NOTE ═══ -->
  <text x="600" y="692" text-anchor="middle" fill="#444" font-size="11">
    Each agent (including THING) carries its own LLM config — swap OpenAI, Anthropic, or Google without rebuilding anything.
  </text>
</svg>
