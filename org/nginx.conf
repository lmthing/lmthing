server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: real files (hashed /assets/, favicons) match $uri; every
    # other path (client-side doc routes) falls through to the SPA shell. The
    # markdown docs are bundled into the JS via a Vite glob import, so there is
    # nothing to serve statically here.
    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the SPA shell, or returning users keep an old index.html that
    # references stale (since-replaced) /assets/ hashes after a deploy and see
    # the previous build until a hard refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
