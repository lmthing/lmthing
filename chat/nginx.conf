server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation headers required for WebContainer (SharedArrayBuffer)
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    # Never cache the SPA shell, or returning users keep an old index.html that
    # references stale (since-replaced) /assets/ hashes after a deploy and see
    # the previous build until a hard refresh.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
        # A location with its own add_header does NOT inherit the server-level
        # ones, so re-declare the cross-origin isolation headers the shell needs
        # for SharedArrayBuffer / WebContainer.
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }
}
