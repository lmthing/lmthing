# HTTP -> HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-http-redirect
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: chat-http
  hostnames:
    - lmthing.chat
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# /api/* -> Dynamic per-user backend (JWT-authenticated, Lua-routed).
# The served UI's fetches carry `Authorization: Bearer`; its WS carries
# `?access_token=`.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-api-proxy
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: chat-https
  hostnames:
    - lmthing.chat
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        # No path rewrite: the multi-session pod server serves routes UNDER /api
        # (/api/projects, /api/sessions, /api/ws, …), so the prefix must be kept.
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1

---
# /* -> Static unified web app (JWT-free). Serves the document + /assets/*; the
# app self-authenticates (@lmthing/auth) and calls /api/* with a Bearer token.
# Surface is chosen client-side by hostname (/chat on lmthing.chat).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-static
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: chat-https
  hostnames:
    - lmthing.chat
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: chat
          namespace: lmthing
          port: 80
          weight: 1
