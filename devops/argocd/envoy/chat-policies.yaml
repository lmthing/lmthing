# Dynamic per-user routing for lmthing.chat.
#
# The shared infrastructure resources (`dynamic-user-backend` Backend and the
# `rewrite-host-from-header` HTTPRouteFilter) are declared once in
# computer-policies.yaml and reused here — they are cluster singletons in the
# gateway namespace, so they are NOT redeclared.

# Lua script: extracts user ID from JWT claim, constructs per-user upstream.
# Identical logic to computer-lua-routing, bound to the chat dynamic routes.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: chat-lua-routing
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: chat-api-proxy
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:headers():remove("x-dynamic-host-header")

          local user_id = request_handle:headers():get("x-user-id")
          if user_id == nil then
            request_handle:respond(
              {[":status"] = "401", ["content-type"] = "text/plain"},
              "missing user_id claim"
            )
            return
          end

          if not string.match(user_id, "^[A-Za-z0-9_-]+$") then
            request_handle:respond(
              {[":status"] = "400", ["content-type"] = "text/plain"},
              "invalid user_id"
            )
            return
          end

          local upstream = "lmthing.user-" .. user_id .. ".svc.cluster.local:8080"
          request_handle:headers():replace("x-dynamic-host-header", upstream)

          -- Stash context for the activator (envoy_on_response can't read request
          -- headers): the validated gateway JWT (to re-auth the wake call like
          -- /ensure) + whether this is a document navigation (response shape).
          local token = nil
          local auth = request_handle:headers():get("authorization")
          if auth ~= nil and string.sub(auth, 1, 7) == "Bearer " then
            token = string.sub(auth, 8)
          end
          if token == nil then
            local cookie = request_handle:headers():get("cookie")
            if cookie ~= nil then token = string.match(cookie, "access_token=([^;]+)") end
          end
          if token == nil then
            token = string.match(request_handle:headers():get(":path"), "[?&]access_token=([^&]+)")
          end
          local rmd = request_handle:streamInfo():dynamicMetadata()
          if token ~= nil then rmd:set("activator", "token", token) end
          rmd:set("activator", "doc", request_handle:headers():get("sec-fetch-dest") == "document")
        end

        -- The user's pod is scaled to zero (Envoy has no Service endpoint → a
        -- locally-generated 503/504). Wake it via the always-on gateway and hand
        -- the caller a self-healing "waking…" response so it recovers on its own.
        function envoy_on_response(response_handle)
          local status = response_handle:headers():get(":status")
          if status ~= "503" and status ~= "504" then return end
          -- Only Envoy's own no-endpoint reply lacks this upstream-timing header; a
          -- 503 the pod itself returned (e.g. memory pressure) has it → pass through.
          if response_handle:headers():get("x-envoy-upstream-service-time") ~= nil then return end

          local md = response_handle:streamInfo():dynamicMetadata():get("activator")
          local token = md and md["token"]
          if token ~= nil then
            -- Fire-and-forget POST /api/compute/wake (direct cluster call, bypasses
            -- the public edge). authMiddleware verifies the forwarded JWT — a caller
            -- can only wake its own pod. 5th arg true = asynchronous.
            response_handle:httpCall(
              "gateway-activator",
              {
                [":method"] = "POST",
                [":path"] = "/api/compute/wake",
                [":authority"] = "gateway",
                ["authorization"] = "Bearer " .. token,
              },
              "", 2000, true)
          end

          response_handle:headers():replace("retry-after", "2")
          if md and md["doc"] then
            local html = [[<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Waking your workspace…</title><style>html{color-scheme:light dark}body{margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;gap:1.25rem}.s{width:2.5rem;height:2.5rem;border:3px solid;border-top-color:transparent;border-radius:50%;animation:r 1s linear infinite;opacity:.55}p{opacity:.7;font-size:.95rem;margin:0}@keyframes r{to{transform:rotate(360deg)}}</style><div class=s></div><p id=m>Waking your workspace…</p><script>var t=Date.now(),d={n:0,t:0};try{d=JSON.parse(sessionStorage.lm_wake)}catch(e){}if(t-d.t>30000){d.n=0}d.n++;d.t=t;sessionStorage.lm_wake=JSON.stringify(d);if(d.n>28){sessionStorage.lm_wake='';document.getElementById('m').textContent='Still waking — tap to retry';document.body.style.cursor='pointer';document.body.onclick=function(){location.reload()}}else{setTimeout(function(){location.reload()},900)}</script>]]
            response_handle:headers():replace("content-type", "text/html; charset=utf-8")
            response_handle:body(true):setBytes(html)
          else
            response_handle:headers():replace("content-type", "application/json")
            response_handle:body(true):setBytes('{"waking":true}')
          end
        end

---
# JWT validation — extracts `sub` claim as x-user-id header.
# Reuses computer's exact extractFrom (Authorization header + access_token query
# param) and claimToHeaders mapping. No cookie source. Bound to the /api proxy.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: chat-jwt
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: chat-api-proxy
  jwt:
    providers:
      - name: gateway
        # @lmthing/auth carries the gateway-issued HS256 token (no iss/aud).
        # Validate the HMAC signature against a local JWKS (oct key) sourced from
        # the gateway-jwt-jwks ConfigMap, created out-of-band so the signing
        # secret never enters git.
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
          params:
            - access_token
        claimToHeaders:
          - claim: sub
            header: x-user-id
        localJWKS:
          type: ValueRef
          valueRef:
            group: ""
            kind: ConfigMap
            name: gateway-jwt-jwks
