# Per-user pod routing for lmthing.app (app-api-proxy = /api/*, app-pages-proxy = /app/*,
# app-pages-bare = the /* catch-all root mount lmthing.app/<project>/…).
# A project-app is SINGLE-USER and has no auth of its own — the only auth here is the
# PLATFORM picking which pod. The per-user JWT (sub → x-user-id → Lua upstream) is read from
# the Authorization: Bearer header / access_token param (SPA fetches, install POST) AND from
# a scoped `access_token` COOKIE set by the shell after login — the cookie is what lets a
# page navigation and its relative <script>/<link> assets route to the user's pod (a browser
# can't put a Bearer header on those). This is a platform session, not app auth; the pod never
# checks it. Localhost has no gateway and needs no auth at all.

# Lua script: extracts user ID from the JWT-derived x-user-id header, constructs
# the per-user pod upstream (identical to studio-lua-routing / chat-lua-routing).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: app-lua-routing
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-api-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-install-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-pages-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-pages-bare
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:headers():remove("x-dynamic-host-header")

          local user_id = request_handle:headers():get("x-user-id")
          if user_id == nil then
            request_handle:respond(
              {[":status"] = "401", ["content-type"] = "text/plain"},
              "missing user_id claim"
            )
            return
          end

          -- The same gateway JWT can arrive in BOTH the Authorization header AND the
          -- access_token cookie: page/asset navigations under the root app mount
          -- (lmthing.app/<project>/…) rely on the cookie (path=/), and same-origin
          -- /api/* XHRs send that cookie too while also carrying the Bearer header.
          -- Envoy then writes the `sub` claim into x-user-id once PER source, joined
          -- with a comma ("<id>,<id>"). It is the same user either way, so collapse to
          -- the first value before validating + routing (otherwise the comma fails the
          -- namespace-safe check below → spurious 400 "invalid user_id").
          user_id = string.match(user_id, "^[^,]+") or user_id

          if not string.match(user_id, "^[A-Za-z0-9_-]+$") then
            request_handle:respond(
              {[":status"] = "400", ["content-type"] = "text/plain"},
              "invalid user_id"
            )
            return
          end

          local upstream = "lmthing.user-" .. user_id .. ".svc.cluster.local:8080"
          request_handle:headers():replace("x-dynamic-host-header", upstream)

          -- Stash context for the activator (envoy_on_response can't read request
          -- headers): the validated gateway JWT (to re-auth the wake call like
          -- /ensure) + whether this is a document navigation (response shape).
          local token = nil
          local auth = request_handle:headers():get("authorization")
          if auth ~= nil and string.sub(auth, 1, 7) == "Bearer " then
            token = string.sub(auth, 8)
          end
          if token == nil then
            local cookie = request_handle:headers():get("cookie")
            if cookie ~= nil then token = string.match(cookie, "access_token=([^;]+)") end
          end
          if token == nil then
            token = string.match(request_handle:headers():get(":path"), "[?&]access_token=([^&]+)")
          end
          local rmd = request_handle:streamInfo():dynamicMetadata()
          if token ~= nil then rmd:set("activator", "token", token) end
          rmd:set("activator", "doc", request_handle:headers():get("sec-fetch-dest") == "document")
        end

        -- The user's pod is scaled to zero (Envoy has no Service endpoint → a
        -- locally-generated 503/504). Wake it via the always-on gateway and hand
        -- the caller a self-healing "waking…" response so it recovers on its own.
        function envoy_on_response(response_handle)
          local status = response_handle:headers():get(":status")
          if status ~= "503" and status ~= "504" then return end
          -- Only Envoy's own no-endpoint reply lacks this upstream-timing header; a
          -- 503 the pod itself returned (e.g. memory pressure) has it → pass through.
          if response_handle:headers():get("x-envoy-upstream-service-time") ~= nil then return end

          local md = response_handle:streamInfo():dynamicMetadata():get("activator")
          local token = md and md["token"]
          if token ~= nil then
            -- Fire-and-forget POST /api/compute/wake (direct cluster call, bypasses
            -- the public edge). authMiddleware verifies the forwarded JWT — a caller
            -- can only wake its own pod. 5th arg true = asynchronous.
            response_handle:httpCall(
              "gateway-activator",
              {
                [":method"] = "POST",
                [":path"] = "/api/compute/wake",
                [":authority"] = "gateway",
                ["authorization"] = "Bearer " .. token,
              },
              "", 2000, true)
          end

          response_handle:headers():replace("retry-after", "2")
          if md and md["doc"] then
            -- Fun, engaging "waking up" screen — a self-contained HTML twin of the
            -- SPA's WakingScreen component (sdk/org/apps/web/src/lib/waking-screen.tsx):
            -- orbiting orbs + a pulsing core + rotating playful status lines. No design
            -- tokens available here (this HTML ships to a not-yet-woken pod's origin),
            -- so colors are literal; keep the vibe in sync with the React component.
            local html = [[<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Waking your workspace…</title><style>html{color-scheme:light dark}body{margin:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;gap:2rem}.o{position:relative;width:128px;height:128px;animation:spin 2.4s linear infinite}.c{position:absolute;top:50%;left:50%;width:22px;height:22px;margin:-11px 0 0 -11px;border-radius:50%;background:#6366f1;box-shadow:0 0 24px 4px #6366f1;animation:pulse 1.8s ease-in-out infinite}.d{position:absolute;top:50%;left:50%;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%}.d1{background:#22d3ee;transform:rotate(0deg) translateX(56px)}.d2{background:#f472b6;transform:rotate(120deg) translateX(56px)}.d3{background:#fbbf24;transform:rotate(240deg) translateX(56px)}.t{text-align:center;display:flex;flex-direction:column;gap:.4rem}h1{margin:0;font-size:1.05rem;font-weight:600}p{margin:0;opacity:.65;font-size:.9rem;animation:fade .5s ease}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.28);opacity:.45}}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:.65;transform:none}}@media(prefers-reduced-motion:reduce){.o,.c{animation:none}}</style><div class=o><div class=c></div><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span></div><div class=t><h1>Waking your workspace</h1><p id=m>Booting your app…</p></div><script>var t=Date.now(),d={n:0,t:0};try{d=JSON.parse(sessionStorage.lm_wake)}catch(e){}if(t-d.t>30000){d.n=0}d.n++;d.t=t;sessionStorage.lm_wake=JSON.stringify(d);var m=document.getElementById('m');if(d.n>15){sessionStorage.lm_wake='';m.textContent='Still waking — tap to retry';document.body.style.cursor='pointer';document.body.onclick=function(){location.reload()}}else{var M=['Booting your app…','Warming up the sandbox…','Summoning THING…','Loading your spaces…','Spinning up QuickJS…','Almost there…'],i=0;setInterval(function(){i=(i+1)%M.length;m.textContent=M[i]},2400);setTimeout(function(){location.reload()},1500)}</script>]]
            response_handle:headers():replace("content-type", "text/html; charset=utf-8")
            response_handle:body(true):setBytes(html)
          else
            response_handle:headers():replace("content-type", "application/json")
            response_handle:body(true):setBytes('{"waking":true}')
          end
        end

---
# JWT validation — extracts `sub` claim as x-user-id header (identical to studio-jwt:
# gateway-issued HS256 token validated via the local gateway-jwt-jwks ConfigMap).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: app-jwt
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-api-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-install-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-pages-proxy
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: app-pages-bare
  jwt:
    providers:
      - name: gateway
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
          params:
            - access_token
          # Platform session for page + asset requests (browser navigation / <script>/<link>
          # can't send a Bearer header): the lmthing.app shell sets this scoped cookie after login.
          cookies:
            - access_token
        claimToHeaders:
          - claim: sub
            header: x-user-id
        localJWKS:
          type: ValueRef
          valueRef:
            group: ""
            kind: ConfigMap
            name: gateway-jwt-jwks
