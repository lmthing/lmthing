apiVersion: apps/v1
kind: Deployment
metadata:
  name: org
  namespace: lmthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: org
  template:
    metadata:
      labels:
        app: org
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: org
          image: lmthingacr.azurecr.io/org:aa05c7f
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: org
  namespace: lmthing
spec:
  selector:
    app: org
  ports:
    - port: 80
      targetPort: 80
