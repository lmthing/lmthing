name: Build and Push Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cloud/gateway/**'
      - 'computer/**'
      - 'sdk/libs/**'
      - 'sdk/org/**'
      - 'devops/argocd/compute/Dockerfile'
      - 'studio/**'
      - 'chat/**'
      - 'com/**'
      - 'social/**'
      - 'store/**'
      - 'space/**'
      - 'team/**'
      - 'blog/**'
      - 'casa/**'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
          submodules: recursive

      - name: Detect changed image sources
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'cloud/gateway/**'
            computer:
              - 'computer/**'
              - 'sdk/libs/auth/**'
              - 'sdk/org/cli/**'
              - 'sdk/libs/css/**'
              - 'sdk/libs/state/**'
              - 'sdk/libs/thing/**'
              - 'sdk/libs/ui/**'
              - 'sdk/libs/utils/**'
            compute:
              - 'sdk/org'
              - 'sdk/org/packages/**'
              - 'devops/argocd/compute/Dockerfile'
            studio:
              - 'studio/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            chat:
              - 'chat/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            com:
              - 'com/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            social:
              - 'social/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            store:
              - 'store/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            space:
              - 'space/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            team:
              - 'team/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            blog:
              - 'blog/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'
            casa:
              - 'casa/**'
              - 'sdk/libs/**'
              - 'sdk/org/**'

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build matrix
        id: build-matrix
        env:
          GATEWAY: ${{ steps.changes.outputs.gateway }}
          COMPUTER: ${{ steps.changes.outputs.computer }}
          COMPUTE: ${{ steps.changes.outputs.compute }}
          STUDIO: ${{ steps.changes.outputs.studio }}
          CHAT: ${{ steps.changes.outputs.chat }}
          COM: ${{ steps.changes.outputs.com }}
          SOCIAL: ${{ steps.changes.outputs.social }}
          STORE: ${{ steps.changes.outputs.store }}
          SPACE: ${{ steps.changes.outputs.space }}
          TEAM: ${{ steps.changes.outputs.team }}
          BLOG: ${{ steps.changes.outputs.blog }}
          CASA: ${{ steps.changes.outputs.casa }}
        run: |
          python3 << 'EOF' >> $GITHUB_OUTPUT
          import json, os

          all_images = [
            {"image": "gateway",  "dockerfile": "cloud/gateway/Dockerfile",        "context": "cloud/gateway", "manifest": "devops/argocd/core/gateway.yaml",              "changed": os.environ["GATEWAY"]},
            {"image": "computer", "dockerfile": "computer/Dockerfile",             "context": ".",             "manifest": "devops/argocd/core/computer.yaml",             "changed": os.environ["COMPUTER"]},
            {"image": "compute",  "dockerfile": "devops/argocd/compute/Dockerfile","context": "sdk/org",       "manifest": "devops/argocd/core/compute-pod-template.yaml", "changed": os.environ["COMPUTE"]},
            {"image": "studio",   "dockerfile": "studio/Dockerfile",               "context": ".",             "manifest": "devops/argocd/core/studio.yaml",               "changed": os.environ["STUDIO"]},
            {"image": "chat",     "dockerfile": "chat/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/chat.yaml",                 "changed": os.environ["CHAT"]},
            {"image": "com",      "dockerfile": "com/Dockerfile",                  "context": ".",             "manifest": "devops/argocd/core/com.yaml",                  "changed": os.environ["COM"]},
            {"image": "social",   "dockerfile": "social/Dockerfile",               "context": ".",             "manifest": "devops/argocd/core/social.yaml",               "changed": os.environ["SOCIAL"]},
            {"image": "store",    "dockerfile": "store/Dockerfile",                "context": ".",             "manifest": "devops/argocd/core/store.yaml",                "changed": os.environ["STORE"]},
            {"image": "space",    "dockerfile": "space/Dockerfile",                "context": ".",             "manifest": "devops/argocd/core/space.yaml",                "changed": os.environ["SPACE"]},
            {"image": "team",     "dockerfile": "team/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/team.yaml",                 "changed": os.environ["TEAM"]},
            {"image": "blog",     "dockerfile": "blog/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/blog.yaml",                 "changed": os.environ["BLOG"]},
            {"image": "casa",     "dockerfile": "casa/Dockerfile",                 "context": ".",             "manifest": "devops/argocd/core/casa.yaml",                 "changed": os.environ["CASA"]},
          ]

          matrix = [
            {"image": e["image"], "dockerfile": e["dockerfile"], "context": e["context"], "manifest": e["manifest"]}
            for e in all_images if e["changed"] == "true"
          ]
          print("matrix=" + json.dumps(matrix))
          EOF

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name lmthingacr

      - name: Build and push ${{ matrix.image }}
        id: build-step
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            lmthingacr.azurecr.io/${{ matrix.image }}:${{ needs.detect.outputs.sha }}
            lmthingacr.azurecr.io/${{ matrix.image }}:latest
          cache-from: type=registry,ref=lmthingacr.azurecr.io/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=lmthingacr.azurecr.io/${{ matrix.image }}:buildcache,mode=max

      - name: Record build metadata
        if: always()
        id: record
        run: |
          echo "started_at=${{ steps.build-step.outputs.metadata && 'unknown' || github.event.created_at }}" >> $GITHUB_OUTPUT
          echo "conclusion=${{ job.status }}" >> $GITHUB_OUTPUT
          python3 -c "
          import json, os, sys
          from datetime import datetime, timezone

          sha = '${{ needs.detect.outputs.sha }}'
          image = '${{ matrix.image }}'
          run_id = '${{ github.run_id }}'
          run_number = '${{ github.run_number }}'

          record = {
            'image': image,
            'sha': sha,
            'run_id': run_id,
            'run_number': int(run_number),
            'run_url': f'https://github.com/\${{ github.repository }}/actions/runs/{run_id}',
            'status': 'completed',
            'conclusion': os.environ.get('JOB_STATUS', 'unknown'),
            'updated_at': datetime.now(timezone.utc).isoformat(),
          }

          os.makedirs('build-data', exist_ok=True)
          with open(f'build-data/{image}.json', 'w') as f:
            json.dump(record, f, indent=2)
          print(f'Wrote build-data/{image}.json')
          "
        env:
          JOB_STATUS: ${{ job.status }}

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-data-${{ matrix.image }}
          path: build-data/${{ matrix.image }}.json
          retention-days: 7

  publish-build-data:
    needs: [detect, build]
    if: always() && needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-data-*
          path: downloaded-artifacts
          merge-multiple: true

      - name: Publish build data to gh-pages
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
          SHA: ${{ needs.detect.outputs.sha }}
        run: |
          python3 << 'EOF'
          import json, os, glob
          from datetime import datetime, timezone

          # Ensure data dirs exist
          os.makedirs('gh-pages/data/builds', exist_ok=True)

          # Collect all downloaded artifacts
          artifact_files = glob.glob('downloaded-artifacts/*.json')
          records = []
          for path in artifact_files:
            with open(path) as f:
              rec = json.load(f)
            # Write per-service latest
            with open(f'gh-pages/data/builds/{rec["image"]}.json', 'w') as f:
              json.dump(rec, f, indent=2)
            records.append(rec)

          # Update rolling history (cap at 50)
          history_path = 'gh-pages/data/builds/history.json'
          history = []
          if os.path.exists(history_path):
            with open(history_path) as f:
              history = json.load(f)

          # Remove old entries for same SHA to avoid duplicates
          sha = os.environ.get('SHA', '')
          history = [h for h in history if h.get('sha') != sha]

          # Prepend new records
          for rec in records:
            history.insert(0, rec)

          # Cap at 50
          history = history[:50]

          with open(history_path, 'w') as f:
            json.dump(history, f, indent=2)

          print(f'Updated history with {len(records)} records, total: {len(history)}')
          EOF

      - name: Commit and push build data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gh-pages/data/builds/
          git diff --staged --quiet || git commit -m "ci: update build data for ${{ needs.detect.outputs.sha }} [skip ci]"
          git pull --rebase origin main
          git push

  update-manifests:
    needs: [detect, build]
    if: always() && needs.detect.outputs.matrix != '[]' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Update image tags in manifests
        env:
          MATRIX: ${{ needs.detect.outputs.matrix }}
          SHA: ${{ needs.detect.outputs.sha }}
        run: |
          python3 << 'EOF'
          import json, os, re

          matrix = json.loads(os.environ["MATRIX"])
          sha = os.environ["SHA"]

          for entry in matrix:
            manifest = entry["manifest"]
            image = entry["image"]
            pattern = rf'(image: lmthingacr\.azurecr\.io/{re.escape(image)}:)\S+'
            with open(manifest) as f:
              content = f.read()
            new_content = re.sub(pattern, rf'\g<1>{sha}', content)
            with open(manifest, "w") as f:
              f.write(new_content)
            # When the compute image is rebuilt, also update COMPUTE_IMAGE_TAG
            # in gateway.yaml so the gateway can advertise the latest tag.
            if image == "compute":
              gw = "devops/argocd/core/gateway.yaml"
              with open(gw) as f:
                gw_content = f.read()
              gw_new = re.sub(
                r'(- name: COMPUTE_IMAGE_TAG\s*\n\s+value:\s*)"[^"]*"',
                rf'\g<1>"{sha}"',
                gw_content,
              )
              with open(gw, "w") as f:
                f.write(gw_new)
          EOF

      - name: Commit and push
        env:
          SHA: ${{ needs.detect.outputs.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devops/argocd/core/
          git diff --staged --quiet || git commit -m "ci: update image tags to $SHA [skip ci]"
          git pull --rebase origin main
          git push

      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER_URL: ${{ secrets.ARGOCD_SERVER_URL }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          [ -z "$ARGOCD_SERVER_URL" ] && exit 0
          curl -sf -X POST "$ARGOCD_SERVER_URL/api/v1/applications/lmthing/sync" \
            -H "Authorization: Bearer $ARGOCD_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"prune": false, "dryRun": false}' || true
