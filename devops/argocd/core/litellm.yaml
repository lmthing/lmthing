apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: lmthing
data:
  config.yaml: |
    # ── Enabled models (all tiers) ─────────────────────────────
    # input/output_cost_per_token = Azure base (per-1K) / 1000 * 1.15 (15% gateway markup).
    # Regenerate this block with: cd cloud && pnpm litellm:generate-models
    # (base prices live in sdk/org/libs/cli/prices/azure.json, refreshed by
    #  `pnpm fetch-azure-prices` in libs/cli).
    model_list:
      - model_name: DeepSeek-V4-Flash
        litellm_params:
          model: azure/DeepSeek-V4-Flash
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 15% markup over Azure base price (azure_per_1K / 1000 * 1.15)
          input_cost_per_token: 0.0000002185
          output_cost_per_token: 0.0000005865
          cache_read_input_token_cost: 0.0000000322
      - model_name: DeepSeek-V4-Pro
        litellm_params:
          model: azure/DeepSeek-V4-Pro
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 15% markup over Azure base price (azure_per_1K / 1000 * 1.15)
          input_cost_per_token: 0.000002001
          output_cost_per_token: 0.000004002
          cache_read_input_token_cost: 0.00000016675
      - model_name: Kimi-K2.6
        litellm_params:
          model: azure/Kimi-K2.6
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 15% markup over Azure base price (azure_per_1K / 1000 * 1.15)
          # Kimi is sold only under `Azure Fireworks Models`, which publishes NO Global
          # meter — these are its Data Zone rates (FW Kimi K2.6 * DZ Tokens).
          input_cost_per_token: 0.00000120175
          output_cost_per_token: 0.00000506
          cache_read_input_token_cost: 0.0000002024
      # gpt-5.5 Global, short-context tier: Azure base $5 in / $30 out / $0.50 cached per
      # 1M (retail meters `5.5 ShortCo {inp,opt,cd inp} Gl`), then ×1.15 markup. The
      # long-context tier (LongCo) is 2x input / 1.5x output; agent prompts average ~7K
      # tokens/request, an order of magnitude inside the short-context bound.
      - model_name: gpt-5.5
        litellm_params:
          model: azure/gpt-5.5
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 15% markup over Azure base price (azure_per_1K / 1000 * 1.15)
          input_cost_per_token: 0.00000575
          output_cost_per_token: 0.0000345
          cache_read_input_token_cost: 0.000000575
      # gpt-5.4-mini — cheap VISION-capable model used by the system-vision space
      # agent (image analysis). ~20x cheaper than gpt-5.5.
      - model_name: gpt-5.4-mini
        litellm_params:
          model: azure/gpt-5.4-mini
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-12-01-preview"
        model_info:
          # 15% markup over Azure base price (azure_per_1K / 1000 * 1.15)
          input_cost_per_token: 0.0000008625
          output_cost_per_token: 0.000005175
          cache_read_input_token_cost: 0.00000008625
      # Audio transcription for the chat vision/audio feature. `whisper` deployment
      # on the same Azure resource; billed per-minute (LiteLLM uses its built-in
      # azure/whisper cost map), so no per-token model_info here. Pods reach this
      # via LM_TRANSCRIBE_MODEL=lmthingcloud:whisper-1 (see cloud/gateway compute.ts),
      # keeping Azure creds off user pods and gating on the user's own key.
      - model_name: whisper-1
        litellm_params:
          model: azure/whisper
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-06-01"

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL

    litellm_settings:
      drop_params: true
      set_verbose: false
      num_retries: 2
      request_timeout: 120

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: lmthing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          # Pinned to a concrete release (not the floating main-latest) so the
          # version is reproducible and imagePullPolicy:IfNotPresent can't serve a
          # stale cached digest. Multi-window key budgets (budget_limits) require
          # >= this release; 1.82.6 silently dropped them. Bump deliberately.
          image: ghcr.io/berriai/litellm:v1.90.0
          imagePullPolicy: IfNotPresent
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: DATABASE_URL
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: LITELLM_MASTER_KEY
            - name: AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AZURE_API_KEY
            - name: AZURE_API_BASE
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AZURE_API_BASE
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: lmthing
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
