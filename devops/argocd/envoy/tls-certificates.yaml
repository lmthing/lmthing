# Let's Encrypt ClusterIssuer for ACME HTTP-01 challenges
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: ACME_EMAIL_PLACEHOLDER
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: lmthing-gw
                namespace: gateway

---
# TLS certificate for auth.lmthing.cloud (Zitadel)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lmthing-auth-tls
  namespace: gateway
spec:
  secretName: lmthing-auth-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - AUTH_DOMAIN_PLACEHOLDER

