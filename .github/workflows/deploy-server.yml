name: Deploy Container Server

on:
  push:
    branches:
      - main
    paths:
      - 'org/libs/server/**'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly.io registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Build image
        run: docker build -t registry.fly.io/lmthing-space:latest org/libs/server

      - name: Push image
        run: docker push registry.fly.io/lmthing-space:latest
