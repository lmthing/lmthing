name: Generate Status Data

on:
  push:
    branches: [main]
    paths:
      - 'devops/argocd/core/*.yaml'
      - 'cloud/gateway/**'
      - 'studio/**'
      - 'chat/**'
      - 'com/**'
      - 'social/**'
      - 'store/**'
      - 'space/**'
      - 'team/**'
      - 'blog/**'
      - 'casa/**'
      - 'computer/**'
      - 'sdk/org/**'
      - 'sdk/org/libs/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate changelog and services metadata
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess
          from datetime import datetime, timezone

          repo = os.environ.get('GITHUB_REPOSITORY', 'lmthing/lmthing')

          services = [
            {"name": "gateway",  "domain": "lmthing.cloud",    "emoji": "☁️",  "type": "gateway",  "yaml": "gateway.yaml",              "paths": ["cloud/gateway"]},
            {"name": "studio",   "domain": "lmthing.studio",   "emoji": "🎨",  "type": "vite",     "yaml": "studio.yaml",               "paths": ["studio", "sdk/org/libs", "sdk/org"]},
            {"name": "chat",     "domain": "lmthing.chat",     "emoji": "💬",  "type": "vite",     "yaml": "chat.yaml",                 "paths": ["chat", "sdk/org/libs", "sdk/org"]},
            {"name": "com",      "domain": "lmthing.com",      "emoji": "🌐",  "type": "vite",     "yaml": "com.yaml",                  "paths": ["com", "sdk/org/libs", "sdk/org"]},
            {"name": "social",   "domain": "lmthing.social",   "emoji": "👥",  "type": "vite",     "yaml": "social.yaml",               "paths": ["social", "sdk/org/libs", "sdk/org"]},
            {"name": "store",    "domain": "lmthing.store",    "emoji": "🏪",  "type": "vite",     "yaml": "store.yaml",                "paths": ["store", "sdk/org/libs", "sdk/org"]},
            {"name": "space",    "domain": "lmthing.space",    "emoji": "🚀",  "type": "vite",     "yaml": "space.yaml",                "paths": ["space", "sdk/org/libs", "sdk/org"]},
            {"name": "team",     "domain": "lmthing.team",     "emoji": "👔",  "type": "vite",     "yaml": "team.yaml",                 "paths": ["team", "sdk/org/libs", "sdk/org"]},
            {"name": "blog",     "domain": "lmthing.blog",     "emoji": "📝",  "type": "vite",     "yaml": "blog.yaml",                 "paths": ["blog", "sdk/org/libs", "sdk/org"]},
            {"name": "casa",     "domain": "lmthing.casa",     "emoji": "🏠",  "type": "vite",     "yaml": "casa.yaml",                 "paths": ["casa", "sdk/org/libs", "sdk/org"]},
            {"name": "computer", "domain": "lmthing.computer", "emoji": "🖥️",  "type": "vite",     "yaml": "computer.yaml",             "paths": ["computer", "sdk/org/libs", "sdk/org"]},
            {"name": "compute",  "domain": "minikube-pods",    "emoji": "⚡",  "type": "k8s-pod",  "yaml": "compute-pod-template.yaml", "paths": ["sdk/org/libs", "sdk/org/apps", "sdk/org", "devops/argocd/compute"]},
          ]

          os.makedirs('gh-pages/data/changelog', exist_ok=True)

          services_out = []
          for svc in services:
            # Read deployed SHA from manifest
            manifest = f'devops/argocd/core/{svc["yaml"]}'
            deployed_sha = None
            commit_date = None
            try:
              with open(manifest) as f:
                content = f.read()
              m = re.search(r'image:\s*lmthingacr\.azurecr\.io/[a-zA-Z0-9-]+:([a-fA-F0-9]+)', content)
              if m:
                deployed_sha = m.group(1)
                # Get commit date for that SHA
                r = subprocess.run(['git', 'show', '-s', '--format=%ci', deployed_sha],
                  capture_output=True, text=True)
                if r.returncode == 0:
                  commit_date = r.stdout.strip().split('\n')[0]
            except Exception as e:
              print(f"Warning: could not read manifest for {svc['name']}: {e}")

            # Get recent commits touching this service's paths (last 50)
            path_args = []
            for p in svc['paths']:
              path_args.extend(['--', p])

            log_cmd = ['git', 'log', '--format=%H|%s|%an|%ai', '-50'] + path_args
            r = subprocess.run(log_cmd, capture_output=True, text=True)

            entries = []
            for line in r.stdout.strip().split('\n'):
              if not line:
                continue
              parts = line.split('|', 3)
              if len(parts) < 4:
                continue
              hash_, subject, author, date = parts
              # Parse conventional commit
              cc = re.match(r'^(\w+)(?:\(([^)]+)\))?\!?:\s*(.+)$', subject)
              if cc:
                ctype, scope, msg = cc.group(1), cc.group(2) or '', cc.group(3)
              else:
                ctype, scope, msg = 'chore', '', subject

              entries.append({
                'hash': hash_[:8],
                'full_hash': hash_,
                'type': ctype,
                'scope': scope,
                'subject': msg,
                'author': author,
                'date': date,
                'url': f'https://github.com/{repo}/commit/{hash_}',
              })

            changelog_path = f'gh-pages/data/changelog/{svc["name"]}.json'
            with open(changelog_path, 'w') as f:
              json.dump(entries, f, indent=2)
            print(f'Wrote {changelog_path} ({len(entries)} entries)')

            svc_out = {
              'name': svc['name'],
              'domain': svc['domain'],
              'emoji': svc['emoji'],
              'type': svc['type'],
              'yaml': svc['yaml'],
              'manifest': manifest,
              'isInternal': svc['name'] == 'compute',
            }
            if deployed_sha:
              svc_out['deployedSha'] = deployed_sha
            if commit_date:
              svc_out['deployedAt'] = commit_date
            services_out.append(svc_out)

          with open('gh-pages/data/services.json', 'w') as f:
            json.dump({'services': services_out, 'updatedAt': datetime.now(timezone.utc).isoformat()}, f, indent=2)
          print('Wrote gh-pages/data/services.json')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gh-pages/data/
          git diff --staged --quiet || git commit -m "ci: update status data [skip ci]"
          git push
