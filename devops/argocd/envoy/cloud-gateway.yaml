apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: lmthing-gw
  namespace: gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: eg
  listeners:
    # ── lmthing.cloud ──────────────────────────────────────────
    - name: cloud-http
      hostname: DOMAIN_PLACEHOLDER
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: cloud-https
      hostname: DOMAIN_PLACEHOLDER
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: lmthing-cloud-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
    # ── lmthing.computer ───────────────────────────────────────
    - name: computer-http
      hostname: COMPUTER_DOMAIN_PLACEHOLDER
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: computer-https
      hostname: COMPUTER_DOMAIN_PLACEHOLDER
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: lmthing-computer-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
