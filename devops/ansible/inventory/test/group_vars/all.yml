---
helm_enabled: true
metrics_server_enabled: true

# TLS certificate management (Let's Encrypt via cert-manager)
cert_manager_enabled: true
cert_manager_controller_extra_args:
  - "--enable-gateway-api"

# LoadBalancer for bare-metal (advertises node IP via ARP)
metallb_enabled: true
metallb_speaker_enabled: true
kube_proxy_strict_arp: true
metallb_config:
  address_pools:
    primary:
      ip_range:
        - 4.223.83.5/32
      auto_assign: true
  layer2:
    - primary
# When scaling: add public IPs of all nodes to ip_range.
# Example with multiple nodes:
#   ip_range:
#     - 4.223.83.5/32
#     - 135.225.105.99/32
