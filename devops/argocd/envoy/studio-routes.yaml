# HTTP -> HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: studio-http-redirect
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: studio-http
  hostnames:
    - lmthing.studio
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# /api/* -> Dynamic per-user backend (JWT-authenticated, Lua-routed)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: studio-api-proxy
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: studio-https
  hostnames:
    - lmthing.studio
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: rewrite-host-from-header
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: dynamic-user-backend
          weight: 1

---
# /* -> Static SPA fallback (studio frontend)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: studio-static
  namespace: gateway
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: lmthing-gw
      sectionName: studio-https
  hostnames:
    - lmthing.studio
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: studio
          namespace: lmthing
          port: 80
          weight: 1
