---
- name: Create envoy-gateway-system namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: envoy-gateway-system

- name: Install Envoy Gateway via Helm (OCI)
  kubernetes.core.helm:
    name: eg
    chart_ref: oci://docker.io/envoyproxy/gateway-helm
    release_namespace: envoy-gateway-system
    chart_version: "{{ envoy_gateway_chart_version | default('v1.7.1') }}"
    create_namespace: true
    wait: true
    wait_timeout: "300s"

- name: Wait for Envoy Gateway controller to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: envoy-gateway-system
    name: envoy-gateway
  register: eg_deployment
  until: >-
    eg_deployment.resources | length > 0 and
    (eg_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Verify Gateway API CRDs are installed
  ansible.builtin.command:
    cmd: kubectl get crd gateways.gateway.networking.k8s.io
  changed_when: false
