# Ansible Vault encrypted secrets.
# Encrypt this file with: ansible-vault encrypt vault.yml
# Edit with: ansible-vault edit vault.yml
#
# All values below are placeholders — replace with real values before encrypting.

vault_domain: lmthing.cloud
vault_computer_domain: lmthing.computer
vault_base_url: https://lmthing.cloud
vault_acme_email: admin@lmthing.cloud

vault_azure_api_key: your-azure-api-key
