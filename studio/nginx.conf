server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Content-hashed bundles — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The SPA shell must NOT be cached, or returning users keep an old
    # index.html that references stale (since-replaced) /assets/ hashes after a
    # deploy — they then see the previous build until a hard refresh. Always
    # revalidate the shell so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
