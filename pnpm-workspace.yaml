packages:
  - blog
  - studio
  - casa
  - chat
  - com
  - computer
  - space
  - social
  - store
  - team
  - cloud
  - sdk/libs/*
  - sdk/org/*

catalog:
  '@modelcontextprotocol/sdk': 1.29.0
  '@supabase/supabase-js': ^2.99.1
  '@types/node': ^24
  dotenv: ^16.6.1
  supabase: ^2.78.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
