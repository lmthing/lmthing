# Dynamic backend for per-user routing
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: dynamic-user-backend
  namespace: gateway
spec:
  type: DynamicResolver

---
# Rewrites upstream hostname from the x-dynamic-host-header
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: rewrite-host-from-header
  namespace: gateway
spec:
  urlRewrite:
    hostname:
      type: Header
      header: x-dynamic-host-header

---
# Lua script: extracts user ID from JWT claim, constructs per-user upstream
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: computer-lua-routing
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: computer-api-proxy
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          request_handle:headers():remove("x-dynamic-host-header")

          local user_id = request_handle:headers():get("x-user-id")
          if user_id == nil then
            request_handle:respond(
              {[":status"] = "401", ["content-type"] = "text/plain"},
              "missing user_id claim"
            )
            return
          end

          if not string.match(user_id, "^[A-Za-z0-9_-]+$") then
            request_handle:respond(
              {[":status"] = "400", ["content-type"] = "text/plain"},
              "invalid user_id"
            )
            return
          end

          local upstream = "lmthing.user-" .. user_id .. ".svc.cluster.local:8080"
          request_handle:headers():replace("x-dynamic-host-header", upstream)
        end

---
# JWT validation via Zitadel — extracts `sub` claim as x-user-id header
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: computer-jwt
  namespace: gateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: computer-api-proxy
  jwt:
    providers:
      - name: zitadel
        issuer: ZITADEL_JWT_ISSUER_PLACEHOLDER
        audiences:
          - lmthing
        extractFrom:
          headers:
            - name: Authorization
          params:
            - access_token
        claimToHeaders:
          - claim: sub
            header: x-user-id
        remoteJWKS:
          cacheDuration: 300s
          uri: ZITADEL_JWKS_URI_PLACEHOLDER
