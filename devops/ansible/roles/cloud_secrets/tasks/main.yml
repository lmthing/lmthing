---
# This role creates K8s secrets from Ansible Vault variables and runs database
# migrations. Secrets are managed outside ArgoCD to keep sensitive values out of git.

# ── Create secrets directly via kubectl ──────────────────────
- name: Create lmthing-secrets in cluster
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: lmthing-secrets
        namespace: lmthing
      type: Opaque
      stringData:
        DOMAIN: "{{ vault_domain }}"
        COMPUTER_DOMAIN: "{{ vault_computer_domain }}"
        AUTH_DOMAIN: "{{ vault_auth_domain }}"
        BASE_URL: "{{ vault_base_url }}"
        ACME_EMAIL: "{{ vault_acme_email }}"
        AZURE_API_KEY: "{{ vault_azure_api_key }}"
        AZURE_API_BASE: "{{ vault_azure_api_base }}"
        POSTGRES_USER: "{{ vault_postgres_user }}"
        POSTGRES_PASSWORD: "{{ vault_postgres_password }}"
        ZITADEL_DB_PASSWORD: "{{ vault_zitadel_db_password }}"
        ZITADEL_MASTER_KEY: "{{ vault_zitadel_master_key }}"
        ZITADEL_ADMIN_PASSWORD: "{{ vault_zitadel_admin_password }}"
        ZITADEL_ISSUER: "{{ vault_zitadel_issuer }}"
        ZITADEL_GITHUB_IDP_ID: "{{ vault_zitadel_github_idp_id }}"
        ZITADEL_SERVICE_PAT: "{{ vault_zitadel_service_pat }}"
        ZITADEL_CLIENT_ID: "{{ vault_zitadel_client_id }}"
        ZITADEL_CLIENT_SECRET: "{{ vault_zitadel_client_secret }}"
        DATABASE_URL: "{{ vault_database_url }}"
        STRIPE_SECRET_KEY: "{{ vault_stripe_secret_key }}"
        STRIPE_WEBHOOK_SECRET: "{{ vault_stripe_webhook_secret }}"
        STRIPE_PRICE_BASIC: "{{ vault_stripe_price_basic }}"
        STRIPE_PRICE_PRO: "{{ vault_stripe_price_pro }}"
        STRIPE_PRICE_MAX: "{{ vault_stripe_price_max }}"
        LITELLM_MASTER_KEY: "{{ vault_litellm_master_key }}"
        GATEWAY_JWT_SECRET: "{{ vault_gateway_jwt_secret }}"
        GITHUB_APP_ID: "{{ vault_github_app_id | default('') }}"
        GITHUB_APP_SLUG: "{{ vault_github_app_slug | default('') }}"
        GITHUB_APP_PRIVATE_KEY: "{{ vault_github_app_private_key | default('') }}"
        GITHUB_ISSUES_TOKEN: "{{ vault_github_issues_token | default('') }}"
        # OAuth integrations (Connections) — per-provider client creds + token
        # encryption key. Each is optional: a provider whose creds are blank
        # reports configured:false and degrades gracefully. CONNECTIONS_ENC_KEY
        # blank ⇒ connect/token-mint throw (encryption at rest is required).
        GOOGLE_OAUTH_CLIENT_ID: "{{ vault_google_oauth_client_id | default('') }}"
        GOOGLE_OAUTH_CLIENT_SECRET: "{{ vault_google_oauth_client_secret | default('') }}"
        SLACK_OAUTH_CLIENT_ID: "{{ vault_slack_oauth_client_id | default('') }}"
        SLACK_OAUTH_CLIENT_SECRET: "{{ vault_slack_oauth_client_secret | default('') }}"
        GITHUB_OAUTH_CLIENT_ID: "{{ vault_github_oauth_client_id | default('') }}"
        GITHUB_OAUTH_CLIENT_SECRET: "{{ vault_github_oauth_client_secret | default('') }}"
        CONNECTIONS_ENC_KEY: "{{ vault_connections_enc_key | default('') }}"
        # Shared token authenticating requests to the in-cluster headless-browser
        # render service (browserless). Consumed by the `render` Deployment as TOKEN
        # and injected by the gateway into each pod's user-env as RENDER_SERVICE_TOKEN.
        RENDER_SERVICE_TOKEN: "{{ vault_render_service_token | default('') }}"
        # Shared bearer token gating the scenario dashboard (automation/app) —
        # both the viewer (browser) and the ingest client authenticate with it.
        # Generate with: openssl rand -base64 32
        DASH_VIEW_TOKEN: "{{ vault_dash_view_token | default('') }}"
        ACR_REGISTRY: "{{ vault_acr_registry }}"
        ACR_USERNAME: "{{ vault_acr_username }}"
        ACR_PASSWORD: "{{ vault_acr_password }}"
  no_log: true

# ── Create ACR imagePullSecret in lmthing namespace ─────────
- name: Create ACR pull secret in lmthing namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: acr-pull-secret
        namespace: lmthing
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ {'auths': {vault_acr_registry: {'auth': (vault_acr_username + ':' + vault_acr_password) | b64encode}}} | to_json | b64encode }}"
  no_log: true

# ── Sync Postgres lmthing user password ──────────────────────
# The PVC persists across redeploys so POSTGRES_PASSWORD env var only applies
# on first init. This ensures the password always matches DATABASE_URL.
- name: Wait for Postgres pod to be ready before password sync
  kubernetes.core.k8s_info:
    kind: StatefulSet
    name: postgres
    namespace: lmthing
  register: postgres_ss_pw
  until: >
    postgres_ss_pw.resources | length > 0 and
    (postgres_ss_pw.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Sync lmthing Postgres user password to match DATABASE_URL
  ansible.builtin.shell: |
    kubectl exec -n lmthing postgres-0 -- \
      psql -U "{{ vault_postgres_user }}" -d lmthing -c \
      "ALTER USER {{ vault_postgres_user }} PASSWORD '{{ vault_postgres_password }}';"
  changed_when: true
  no_log: true

# ── Database migrations (runs inside Postgres pod) ───────────
- name: Wait for Postgres pod to be ready
  kubernetes.core.k8s_info:
    kind: StatefulSet
    name: postgres
    namespace: lmthing
  register: postgres_ss
  until: >
    postgres_ss.resources | length > 0 and
    (postgres_ss.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Sync database migrations to node
  ansible.builtin.copy:
    src: "{{ migrations_src | default(playbook_dir + '/../../../cloud/migrations/') }}"
    dest: /tmp/lmthing-migrations/
    mode: "0644"

- name: Copy migration files into Postgres pod
  ansible.builtin.shell: |
    for f in /tmp/lmthing-migrations/*.sql; do
      [ -f "$f" ] && kubectl cp "$f" lmthing/$(kubectl get pod -n lmthing -l app=postgres -o jsonpath='{.items[0].metadata.name}'):/tmp/$(basename "$f") 2>&1
    done
  changed_when: true

- name: Run migrations inside Postgres pod
  ansible.builtin.shell: |
    set -euo pipefail
    POD=$(kubectl get pod -n lmthing -l app=postgres -o jsonpath='{.items[0].metadata.name}')
    for f in $(kubectl exec -n lmthing "$POD" -- ls /tmp/*.sql 2>/dev/null | sort); do
      echo "Running migration: $f"
      # ON_ERROR_STOP=1 + no `|| true`: a broken migration must fail the play,
      # not silently leave the gateway schema (profiles/sso_codes) missing.
      kubectl exec -n lmthing "$POD" -- \
        psql -U "{{ vault_postgres_user }}" -d lmthing -v ON_ERROR_STOP=1 -f "$f"
    done
  # pipefail is a bashism; ansible.builtin.shell defaults to /bin/sh (dash on
  # the node), which aborts on `set -o pipefail`. Force bash.
  args:
    executable: /bin/bash
  changed_when: true

- name: Clean up migrations directory on node
  ansible.builtin.file:
    path: /tmp/lmthing-migrations
    state: absent
