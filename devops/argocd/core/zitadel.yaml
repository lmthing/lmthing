apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  namespace: lmthing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zitadel
  template:
    metadata:
      labels:
        app: zitadel
    spec:
      initContainers:
        - name: zitadel-init
          image: ghcr.io/zitadel/zitadel:latest
          args: ["init", "zitadel"]
          env:
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: postgres
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              value: "5432"
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_DB_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: disable
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: POSTGRES_USER
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: POSTGRES_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
              value: disable
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_MASTER_KEY
        - name: zitadel-setup
          image: ghcr.io/zitadel/zitadel:latest
          args: ["setup", "--masterkeyFromEnv"]
          env:
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: postgres
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              value: "5432"
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_DB_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: disable
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_MASTER_KEY
            - name: ZITADEL_EXTERNALDOMAIN
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AUTH_DOMAIN
            - name: ZITADEL_EXTERNALPORT
              value: "443"
            - name: ZITADEL_EXTERNALSECURE
              value: "true"
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_NAME
              value: lmthing
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: admin
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_ADMIN_PASSWORD
        # Disables login v2 (separate service, not bundled in the binary).
        # Uses the eventstore.push function so this is idempotent — re-running
        # setup will re-enable login_v2 via migration 03_default_instance, and
        # this container overwrites it immediately after.
        - name: zitadel-disable-loginv2
          image: postgres:16-alpine
          command:
            - psql
            - "postgresql://lmthing:$(POSTGRES_PASSWORD)@postgres:5432/zitadel"
            - -c
            - |
              SELECT eventstore.push(ARRAY[ROW(
                (SELECT instance_id FROM eventstore.events2 WHERE aggregate_type='feature' LIMIT 1),
                'feature',
                (SELECT aggregate_id FROM eventstore.events2 WHERE aggregate_type='feature' LIMIT 1),
                'feature.instance.login_v2.set',
                2::smallint,
                '{"Value": {"required": false}}'::jsonb,
                '',
                (SELECT owner FROM eventstore.events2 WHERE aggregate_type='feature' LIMIT 1)
              )::eventstore.command]);
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: zitadel
          image: ghcr.io/zitadel/zitadel:latest
          args: ["start", "--masterkeyFromEnv"]
          ports:
            - containerPort: 8080
          env:
            - name: ZITADEL_PORT
              value: "8080"
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_MASTER_KEY
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: postgres
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              value: "5432"
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              value: zitadel
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_DB_PASSWORD
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: disable
            - name: ZITADEL_EXTERNALDOMAIN
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: AUTH_DOMAIN
            - name: ZITADEL_EXTERNALPORT
              value: "443"
            - name: ZITADEL_EXTERNALSECURE
              value: "true"
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_NAME
              value: lmthing
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: admin
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmthing-secrets
                  key: ZITADEL_ADMIN_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /debug/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /debug/healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: zitadel
  namespace: lmthing
spec:
  selector:
    app: zitadel
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
