---
- name: Prune nerdctl builder cache to avoid stale snapshot references
  ansible.builtin.command:
    cmd: nerdctl -n k8s.io builder prune -f
  ignore_errors: true

- name: Remove existing lmthing images to clear corrupted snapshots
  ansible.builtin.command:
    cmd: nerdctl -n k8s.io rmi -f {{ item }}
  loop:
    - lmthing/gateway:latest
    - lmthing/computer:latest
    - lmthing/compute:latest
  ignore_errors: true

- name: Create build directory on node
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /tmp/lmthing-build/gateway
    - /tmp/lmthing-build/computer
    - /tmp/lmthing-build/compute/org/libs/repl

# ── Gateway image ──────────────────────────────────────────────
- name: Sync gateway source to node
  ansible.posix.synchronize:
    src: "{{ gateway_src | default(playbook_dir + '/../../../cloud/gateway/') }}"
    dest: /tmp/lmthing-build/gateway/
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.git"

- name: Build gateway image
  ansible.builtin.command:
    cmd: nerdctl -n k8s.io build -t lmthing/gateway:latest .
    chdir: /tmp/lmthing-build/gateway

# ── Computer SPA image ─────────────────────────────────────────
- name: Sync computer build files to node
  ansible.posix.synchronize:
    src: "{{ computer_src | default(playbook_dir + '/../../../computer/') }}"
    dest: /tmp/lmthing-build/computer/
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=src"
      - "--exclude=.git"

- name: Build computer image
  ansible.builtin.command:
    cmd: nerdctl -n k8s.io build -t lmthing/computer:latest .
    chdir: /tmp/lmthing-build/computer

# ── Compute runtime image (Bun + @lmthing/repl) ───────────────
- name: Sync compute Dockerfile to node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../k8s/compute/Dockerfile"
    dest: /tmp/lmthing-build/compute/Dockerfile
    mode: "0644"

- name: Sync repl source to node
  ansible.posix.synchronize:
    src: "{{ repl_src | default(playbook_dir + '/../../../org/libs/repl/') }}"
    dest: /tmp/lmthing-build/compute/org/libs/repl/
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.git"

- name: Build compute runtime image
  ansible.builtin.command:
    cmd: nerdctl -n k8s.io build -t lmthing/compute:latest -f Dockerfile .
    chdir: /tmp/lmthing-build/compute

# ── Cleanup ────────────────────────────────────────────────────
- name: Clean up build directory
  ansible.builtin.file:
    path: /tmp/lmthing-build
    state: absent
